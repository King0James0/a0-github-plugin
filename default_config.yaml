# GitHub plugin defaults. Override per-scope via the plugin config UI or env.
#
# transport: how the agent talks to GitHub.
#   gh  - shell out to the gh CLI (default; the skills pack carries the command templates)
#   mcp - register GitHub's MCP server into A0's MCP client (planned, not yet implemented)
transport: gh

# Name of the A0 Secret (Settings > External Services > Secrets) holding a GitHub token.
# Auth is stateless: the token is read from this Secret at the moment each gh/git command
# runs and is never written to a gh or git credential store. gh reads GITHUB_TOKEN natively.
secret_key: GITHUB_TOKEN

# gh CLI version to install. "latest" resolves the newest release at install time;
# otherwise pin a tag like "v2.63.2".
gh_version: latest

# --- Watch (github-watch skill) ---
# The authoritative list of repos to poll for new/updated issues and PRs. Edit it in the plugin's
# Config panel (one "owner/name" per line); saying "watch owner/name" in chat updates this same list.
# Stored in the saved config (config.json), not a runtime file. One "owner/name" per line.
watch_repos: ""

# Also include repos you Watch on GitHub (notification subscriptions, gh api user/subscriptions).
# This is GitHub's "Watch" button, NOT "Star". Set false to rely only on watch_repos.
watch_include_subscriptions: true

# What the watcher reports. Issues + PRs are always checked. Comments are intentionally excluded.
watch_scope: issues,prs

# Also report new commits on each repo's default branch since the last check
# (gh api repos/<repo>/commits?since=<ts>). Off by default — commits can be high-volume.
watch_commits: false

# Recurring poll. When true, the plugin self-registers an A0 scheduled task ("github-watch-poll")
# that runs the github-watch skill on a schedule; false removes it. Default off (opt-in).
watch_schedule_enabled: false

# Poll interval in hours (1 = every hour at :00). Clamped to 1..24.
watch_interval_hours: 1

# Where the scheduled poll sends new findings. These are POINTERS only — the plugin does not send
# anything itself; the scheduled task runs in an agent context and uses A0's own channels. You can
# enable more than one.
watch_notify_chat: true          # report results in the task's conversation
watch_notify_telegram: false     # tell the agent to notify via Telegram (uses A0's configured Telegram)
# Free-form delivery instruction the agent will try to fulfill with its available tools (e.g. a
# Discord webhook, email). Best-effort — only works if the agent has a way to do it. Blank = none.
watch_notify_other: ""

# Reserved for the mcp transport (planned second build). Ignored while transport: gh.
mcp:
  mode: hosted                              # hosted | self_hosted
  endpoint: https://api.githubcopilot.com/mcp/
